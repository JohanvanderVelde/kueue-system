apiVersion: v1
kind: Namespace
metadata:
  name: team-gpu
  labels:
    kubernetes.io/metadata.name: team-gpu
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kueue-queue-config
  namespace: team-gpu
  labels:
    kueue.x-k8s.io/queue-config: "true"
data:
  # Queueing strategy
  queueingStrategy: "BestEffortFIFO"

  # ResourceFlavor
  resourceFlavorName: "default-flavor"

  # Naam voor de queues: ClusterQueue wordt cq-<queueName>, LocalQueue wordt lq-<queueName>
  queueName: "team-gpu"

  # Resource quota (YAML string)
  quota: |
    cpu: "8"
    memory: "32Gi"
    nvidia.com/mig-1g.5gb: "4"
    nvidia.com/mig-2g.10gb: "2"
