apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: generate-shared-kueue-queues-fixed
  annotations:
    policies.kyverno.io/title: Generate Shared Kueue Queues (fixed settings)
    policies.kyverno.io/description: >-
      When a ConfigMap with label kueue.x-k8s.io/shared-queue-request=true is
      created in a namespace, this policy generates a ClusterQueue and LocalQueue
      with fixed, platform-managed settings. Teams can only request access to
      the shared cohort; they cannot influence resource limits, cohort, flavor,
      or preemption settings.
      Deleting the ConfigMap removes both generated resources.
spec:
  validationFailureAction: Enforce
  rules:
    # --- Rule 1: Generate ClusterQueue (all settings hardcoded) ---
    - name: generate-shared-cluster-queue
      match:
        any:
          - resources:
              kinds:
                - ConfigMap
              selector:
                matchLabels:
                  kueue.x-k8s.io/shared-queue-request: "true"
      generate:
        synchronize: true
        apiVersion: kueue.x-k8s.io/v1beta2
        kind: ClusterQueue
        name: "cq-shared-{{request.namespace}}"
        data:
          metadata:
            labels:
              managed-by: kyverno
              source-namespace: "{{request.namespace}}"
          spec:
            cohortName: mig-sharing
            queueingStrategy: BestEffortFIFO
            namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: "{{request.namespace}}"
            preemption:
              withinClusterQueue: LowerPriority
              reclaimWithinCohort: Any
              borrowWithinCohort:
                policy: LowerPriority
                maxPriorityThreshold: 100
            resourceGroups:
              - coveredResources:
                  - cpu
                  - memory
                  - nvidia.com/mig-1g.5gb
                  - nvidia.com/mig-2g.10gb
                flavors:
                  - name: default-flavor
                    resources:
                      - name: cpu
                        nominalQuota: 0
                        borrowingLimit: 4
                      - name: memory
                        nominalQuota: 0
                        borrowingLimit: 12Gi
                      - name: nvidia.com/mig-1g.5gb
                        nominalQuota: 0
                        borrowingLimit: 2
                      - name: nvidia.com/mig-2g.10gb
                        nominalQuota: 0
                        borrowingLimit: 2

    # --- Rule 2: Generate LocalQueue ---
    - name: generate-shared-local-queue
      match:
        any:
          - resources:
              kinds:
                - ConfigMap
              selector:
                matchLabels:
                  kueue.x-k8s.io/shared-queue-request: "true"
      generate:
        synchronize: true
        apiVersion: kueue.x-k8s.io/v1beta2
        kind: LocalQueue
        name: "lq-shared-{{request.namespace}}"
        namespace: "{{request.namespace}}"
        data:
          metadata:
            labels:
              managed-by: kyverno
          spec:
            clusterQueue: "cq-shared-{{request.namespace}}"
